<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ahad Portfolio</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --main:#9333ea;
  --secondary:#d946ef;
  --accent:#3b82f6;
  --dark:#0a001a;
  --glow:#a78bfa;
  --glow-pink:#f0abfc;
  --glow-blue:#60a5fa;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
  font-family:'Poppins',sans-serif;
}

body{
  background: radial-gradient(circle at top right,#1a0033,var(--dark),#000a1a);
  color:white;
  overflow-x:hidden;
  position:relative;
}

/* ANIMATED BACKGROUND */
.stars-container{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  overflow:hidden;
}

.stars{
  position:absolute;
  width:100%;
  height:100%;
}

.star{
  position:absolute;
  background:white;
  border-radius:50%;
  animation:twinkle linear infinite;
}

@keyframes twinkle{
  0%,100%{opacity:0;transform:scale(0)}
  50%{opacity:1;transform:scale(1)}
}

/* Shooting stars */
.shooting-star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  box-shadow:0 0 10px 2px rgba(255,255,255,0.8);
  animation:shoot 3s linear infinite;
}

@keyframes shoot{
  0%{
    transform:translate(0,0) rotate(-45deg);
    opacity:1;
  }
  70%{opacity:1}
  100%{
    transform:translate(-300px,300px) rotate(-45deg);
    opacity:0;
  }
}

/* Glowing orbs */
.orb{
  position:absolute;
  border-radius:50%;
  filter:blur(40px);
  opacity:0.15;
  animation:float-orb 20s ease-in-out infinite;
}

@keyframes float-orb{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(100px,-100px) scale(1.2)}
  66%{transform:translate(-100px,50px) scale(0.8)}
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:18px;
  background:rgba(10,0,30,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(147,51,234,0.2);
  z-index:1000;
}

nav a{
  color:#c4b5fd;
  text-decoration:none;
  font-weight:500;
  padding:8px 16px;
  border-radius:8px;
  transition:all 0.3s ease;
  position:relative;
}

nav a:hover{
  color:white;
  background:rgba(147,51,234,0.2);
  transform:translateY(-2px);
}

nav a::after{
  content:'';
  position:absolute;
  bottom:0;
  left:50%;
  width:0;
  height:2px;
  background:linear-gradient(90deg,var(--main),var(--secondary));
  transition:0.3s;
  transform:translateX(-50%);
}

nav a:hover::after{
  width:80%;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

.hero h1{
  font-size:3.8rem;
  background:linear-gradient(135deg,#a78bfa,#c084fc,#e879f9);
  background-size:200% 200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:gradient 4s ease infinite,fadeInUp 1s ease;
  font-weight:700;
  letter-spacing:-1px;
}

@keyframes gradient{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

@keyframes fadeInUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

.hero h1:hover{
  transform:scale(1.05);
  filter:drop-shadow(0 0 30px var(--glow));
}

.sub{
  color:#d8b4fe;
  margin-top:12px;
  font-size:1.15rem;
  font-weight:300;
  letter-spacing:3px;
  animation:fadeInOut 3s ease-in-out infinite;
}

#title{
  font-size:1.3rem !important;
  color:#c4b5fd !important;
  font-weight:400;
  margin-top:8px;
  animation:fadeInOut 3s ease-in-out infinite 1.5s;
}

@keyframes fadeInOut{
  0%,100%{opacity:0;transform:translateY(10px)}
  10%,90%{opacity:1;transform:translateY(0)}
}

/* CV BUTTONS */
.btns{
  display:flex;
  gap:20px;
  margin-top:50px;
  animation:fadeInUp 1s ease 0.5s backwards;
}

.btn{
  padding:14px 32px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#9333ea,#a855f7);
  color:white;
  cursor:pointer;
  transition:all 0.4s ease;
  font-weight:600;
  font-size:15px;
  position:relative;
  overflow:hidden;
  box-shadow:0 4px 15px rgba(147,51,234,0.3);
}

.btn::before{
  content:'';
  position:absolute;
  top:50%;
  left:50%;
  width:0;
  height:0;
  border-radius:50%;
  background:rgba(255,255,255,0.3);
  transform:translate(-50%,-50%);
  transition:width 0.6s,height 0.6s;
}

.btn:hover::before{
  width:300px;
  height:300px;
}

.btn:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 8px 25px rgba(147,51,234,0.5),
             0 0 40px rgba(168,85,247,0.3);
}

.btn:active{
  transform:translateY(-1px) scale(1.02);
}

/* Alternative button style */
.btn:nth-child(2){
  background:transparent;
  border:2px solid #9333ea;
  box-shadow:0 0 20px rgba(147,51,234,0.2);
}

.btn:nth-child(2):hover{
  background:linear-gradient(135deg,#9333ea,#a855f7);
  border-color:transparent;
}

/* SECTIONS */
section{
  padding:100px 20px;
  max-width:1000px;
  margin:auto;
}

h2{
  color:#a78bfa;
  margin-bottom:25px;
  font-size:2.2rem;
  position:relative;
  display:inline-block;
  text-shadow:0 0 20px rgba(147,51,234,0.3);
}

h2::after{
  content:'';
  position:absolute;
  bottom:-8px;
  left:0;
  width:60%;
  height:3px;
  background:linear-gradient(90deg,#9333ea,#c084fc);
  border-radius:2px;
}

/* CARD */
.card{
  background:linear-gradient(135deg,rgba(147,51,234,0.08),rgba(59,130,246,0.05));
  padding:25px;
  border-radius:16px;
  margin-top:15px;
  border:1px solid rgba(147,51,234,0.2);
  backdrop-filter:blur(10px);
  transition:all 0.3s ease;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

.card:hover{
  transform:translateY(-5px);
  border-color:rgba(147,51,234,0.4);
  box-shadow:0 8px 30px rgba(147,51,234,0.2);
}

/* TOOLS GRID */
.grid{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.tag{
  padding:12px 20px;
  background:linear-gradient(135deg,rgba(147,51,234,0.15),rgba(59,130,246,0.1));
  border:1px solid rgba(147,51,234,0.4);
  border-radius:12px;
  transition:all 0.3s ease;
  cursor:default;
  font-weight:500;
}

.tag:hover{
  background:linear-gradient(135deg,rgba(147,51,234,0.25),rgba(168,85,247,0.15));
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 5px 20px rgba(147,51,234,0.3);
  border-color:#a78bfa;
}

/* CONTACT */
.contact-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

.icon{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:15px;
  color:#e9d5ff;
  font-size:1.05rem;
  padding:10px;
  background:rgba(147,51,234,0.1);
  border-radius:10px;
  border:1px solid rgba(147,51,234,0.2);
  transition:0.3s;
}

.icon:hover{
  background:rgba(147,51,234,0.15);
  transform:translateX(5px);
}

/* INPUT */
input,textarea{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:1px solid rgba(147,51,234,0.3);
  border-radius:10px;
  background:rgba(147,51,234,0.08);
  color:white;
  font-family:'Poppins',sans-serif;
  transition:all 0.3s ease;
}

input:focus,textarea:focus{
  outline:none;
  border-color:#9333ea;
  background:rgba(147,51,234,0.12);
  box-shadow:0 0 20px rgba(147,51,234,0.2);
}

input::placeholder,textarea::placeholder{
  color:#a78bfa;
}

textarea{
  resize:vertical;
  min-height:120px;
}

form .btn{
  margin-top:15px;
  width:100%;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero h1{font-size:2.5rem}
  .contact-box{grid-template-columns:1fr}
  .btns{flex-direction:column;width:80%}
  .btn{width:100%}
}

/* GLOW EFFECTS */
@keyframes pulse{
  0%,100%{opacity:0.3}
  50%{opacity:0.6}
}

.hero::before{
  content:'';
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle,rgba(147,51,234,0.15),transparent 70%);
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:pulse 4s ease-in-out infinite;
  z-index:-1;
}
</style>
</head>

<body>

<div class="stars-container">
  <div class="stars" id="stars"></div>
  <div id="orbs"></div>
  <div id="shooting-stars"></div>
</div>

<!-- CONFIG -->
<script>
const CONFIG={
  name:"Ahad Matlaq",
  title:"Software Engineer",
  city:"Your City",
  country:"Your Country",
  bio:"Write your bio here",
  email:"your@email.com",
  phone:"000000000",
  cv:"Cv ahad1.pdf"
};
</script>

<!-- NAV -->
<nav>
  <a href="#about">About</a>
  <a href="#experience">Experience</a>
  <a href="#tools">Tools</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<section class="hero">
  <h1 id="name"></h1>
  <div class="sub" id="location"></div>
  <p style="color:#bbb" id="title"></p>

  <div class="btns">
    <button class="btn" onclick="openCV()">View CV</button>
    <button class="btn" onclick="downloadCV()">Download CV</button>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About</h2>
  <div class="card" id="bio"></div>
</section>

<!-- EXPERIENCE -->
<section id="experience">
  <h2>Experience</h2>
  <div class="card">Add your experience here</div>
</section>

<!-- TOOLS -->
<section id="tools">
  <h2>Tools</h2>
  <div class="grid">
    <div class="tag">HTML</div>
    <div class="tag">CSS</div>
    <div class="tag">JavaScript</div>
    <div class="tag">React</div>
    <div class="tag">Git</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Me</h2>

  <div class="contact-box">

    <div>
      <div class="icon">📧 <span id="email"></span></div>
      <div class="icon">📞 <span id="phone"></span></div>

      <form onsubmit="send(event)">
        <input placeholder="Name" required>
        <input placeholder="Email" required>
        <textarea placeholder="Message" required></textarea>
        <button class="btn">Send</button>
      </form>
    </div>

  </div>
</section>

<script>
// Enhanced stars system
const starsContainer = document.getElementById("stars");
const colors = ['#ffffff','#a78bfa','#c4b5fd','#e0e7ff'];

// Create twinkling stars
for(let i=0;i<200;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  s.style.width=(Math.random()*2+1)+"px";
  s.style.height=s.style.width;
  s.style.animationDuration=(Math.random()*3+2)+"s";
  s.style.animationDelay=Math.random()*3+"s";
  s.style.background=colors[Math.floor(Math.random()*colors.length)];
  starsContainer.appendChild(s);
}

// Create shooting stars
const shootingContainer = document.getElementById("shooting-stars");
for(let i=0;i<5;i++){
  let ss=document.createElement("div");
  ss.className="shooting-star";
  ss.style.left=(Math.random()*100)+"vw";
  ss.style.top=(Math.random()*50)+"vh";
  ss.style.animationDelay=(Math.random()*10)+"s";
  ss.style.animationDuration=(2+Math.random()*2)+"s";
  shootingContainer.appendChild(ss);
}

// Create floating orbs
const orbsContainer = document.getElementById("orbs");
const orbColors = [
  'rgba(147,51,234,0.3)',
  'rgba(168,85,247,0.3)',
  'rgba(192,132,252,0.3)',
  'rgba(59,130,246,0.3)'
];

for(let i=0;i<4;i++){
  let orb=document.createElement("div");
  orb.className="orb";
  orb.style.left=(Math.random()*80)+"vw";
  orb.style.top=(Math.random()*80)+"vh";
  orb.style.width=(Math.random()*300+200)+"px";
  orb.style.height=orb.style.width;
  orb.style.background=orbColors[i];
  orb.style.animationDelay=(Math.random()*5)+"s";
  orb.style.animationDuration=(15+Math.random()*10)+"s";
  orbsContainer.appendChild(orb);
}

// load config
document.getElementById("name").innerText=CONFIG.name;
document.getElementById("title").innerText=CONFIG.title;
document.getElementById("bio").innerText=CONFIG.bio;

document.getElementById("location").innerText=
CONFIG.city+" , "+CONFIG.country;

document.getElementById("email").innerText=CONFIG.email;
document.getElementById("phone").innerText=CONFIG.phone;

// CV
function openCV(){
  window.open(CONFIG.cv);
}
function downloadCV(){
  let a=document.createElement("a");
  a.href=CONFIG.cv;
  a.download=CONFIG.cv;
  a.click();
}

// form
function send(e){
  e.preventDefault();
  alert("Message sent!");
}
</script>

</body>
</html>
