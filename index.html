<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ahad Portfolio</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --main:#a855f7;
  --dark:#0a001a;
  --glow:#b46cff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
  font-family:'Poppins',sans-serif;
}

body{
  background: radial-gradient(circle at top,#1a0033,var(--dark));
  color:white;
  overflow-x:hidden;
}

/* STARS */
.stars{position:fixed;width:100%;height:100%;z-index:-1}
.star{
  position:absolute;
  width:2px;height:2px;
  background:white;
  border-radius:50%;
  animation:fall linear infinite;
}
@keyframes fall{from{transform:translateY(0)}to{transform:translateY(100vh)}}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:15px;
  background:rgba(10,0,30,0.7);
  backdrop-filter:blur(12px);
}

nav a{
  color:#caa6ff;
  text-decoration:none;
  font-weight:500;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:3.2rem;
  color:var(--main);
  text-shadow:0 0 25px var(--glow);
  transition:0.3s;
}

.hero h1:hover{
  transform:scale(1.05);
}

.sub{
  color:#bbb;
  margin-top:5px;
  font-size:1rem;
}

.profile{
  width:160px;
  height:160px;
  border-radius:50%;
  margin-top:20px;
  border:3px solid var(--main);
  box-shadow:0 0 30px var(--glow);
  object-fit:cover;
  transition:0.4s;
}

.profile:hover{
  transform:scale(1.1);
  box-shadow:0 0 50px var(--glow);
}

/* CV BUTTONS */
.btns{
  display:flex;
  gap:15px;
  margin-top:18px;
}

.btn{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:var(--main);
  color:white;
  cursor:pointer;
  transition:0.3s;
  font-weight:500;
}

.btn:hover{
  transform:scale(1.08);
  background:#c084fc;
}

/* SECTIONS */
section{
  padding:90px 20px;
  max-width:1000px;
  margin:auto;
}

h2{
  color:var(--main);
  margin-bottom:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  padding:18px;
  border-radius:12px;
  margin-top:10px;
  border:1px solid rgba(255,255,255,0.08);
}

/* TOOLS GRID */
.grid{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.tag{
  padding:10px 15px;
  background:rgba(168,85,247,0.15);
  border:1px solid rgba(168,85,247,0.4);
  border-radius:10px;
}

/* CONTACT */
.contact-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.icon{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  color:#ddd;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<!-- CONFIG -->
<script>
const CONFIG={
  name:"Ahad Matlaq",
  title:"Software Engineer",
  city:"Your City",
  country:"Your Country",
  bio:"Write your bio here",
  email:"your@email.com",
  phone:"000000000",
  profile:"profile.jpg",
  cv:"Cv ahad1.pdf"
};
</script>

<!-- NAV -->
<nav>
  <a href="#about">About</a>
  <a href="#experience">Experience</a>
  <a href="#tools">Tools</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<section class="hero">
  <h1 id="name"></h1>
  <div class="sub" id="location"></div>
  <p style="color:#bbb" id="title"></p>

  <img id="profile" class="profile"/>

  <div class="btns">
    <button class="btn" onclick="openCV()">View CV</button>
    <button class="btn" onclick="downloadCV()">Download CV</button>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About</h2>
  <div class="card" id="bio"></div>
</section>

<!-- EXPERIENCE -->
<section id="experience">
  <h2>Experience</h2>
  <div class="card">Add your experience here</div>
</section>

<!-- TOOLS -->
<section id="tools">
  <h2>Tools</h2>
  <div class="grid">
    <div class="tag">HTML</div>
    <div class="tag">CSS</div>
    <div class="tag">JavaScript</div>
    <div class="tag">React</div>
    <div class="tag">Git</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Me</h2>

  <div class="contact-box">

    <div>
      <div class="icon">📧 <span id="email"></span></div>
      <div class="icon">📞 <span id="phone"></span></div>

      <form onsubmit="send(event)">
        <input placeholder="Name" required>
        <input placeholder="Email" required>
        <textarea placeholder="Message" required></textarea>
        <button class="btn">Send</button>
      </form>
    </div>

  </div>
</section>

<script>
// stars
for(let i=0;i<120;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  s.style.animationDuration=(2+Math.random()*5)+"s";
  document.getElementById("stars").appendChild(s);
}

// load config
document.getElementById("name").innerText=CONFIG.name;
document.getElementById("title").innerText=CONFIG.title;
document.getElementById("profile").src=CONFIG.profile;
document.getElementById("bio").innerText=CONFIG.bio;

document.getElementById("location").innerText=
CONFIG.city+" , "+CONFIG.country;

document.getElementById("email").innerText=CONFIG.email;
document.getElementById("phone").innerText=CONFIG.phone;

// CV
function openCV(){
  window.open(CONFIG.cv);
}
function downloadCV(){
  let a=document.createElement("a");
  a.href=CONFIG.cv;
  a.download=CONFIG.cv;
  a.click();
}

// form
function send(e){
  e.preventDefault();
  alert("Message sent!");
}
</script>

</body>
</html>
