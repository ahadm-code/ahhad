<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio</title>

<style>
/* =========================
   CONFIG STYLE (DO NOT TOUCH DESIGN)
========================= */
:root {
  --main: #a855f7;
  --dark: #0a001a;
  --glow: #b46cff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  scroll-behavior: smooth;
  font-family: Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #1a0033, var(--dark));
  color: white;
  overflow-x: hidden;
}

/* STARS */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(0); }
  to { transform: translateY(100vh); }
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 15px;
  background: rgba(10,0,30,0.7);
  backdrop-filter: blur(10px);
}

nav a {
  color: #caa6ff;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 3rem;
  color: var(--main);
  text-shadow: 0 0 20px var(--glow);
}

.profile {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  margin-top: 20px;
  border: 3px solid var(--main);
  box-shadow: 0 0 25px var(--glow);
  object-fit: cover;
}

.btn {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  background: var(--main);
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* SECTIONS */
section {
  padding: 80px 20px;
  max-width: 900px;
  margin: auto;
}

h2 {
  color: var(--main);
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}
</style>
</head>

<body>

<!-- ⭐ STARS -->
<div class="stars" id="stars"></div>

<!-- =========================
     🔥 EDIT YOUR DATA HERE ONLY
========================= -->
<script>
const CONFIG = {
  name: "Ahad Matlaq",
  title: "Software Engineer",
  city: "Your City",
  country: "Your Country",
  bio: "Write your bio here",
  email: "your@email.com",
  phone: "000000000",
  profileImage: "profile.jpg",
  cvFile: "Cv ahad1.pdf"
};
</script>

<!-- NAV -->
<nav>
  <a href="#about">About</a>
  <a href="#education">Education</a>
  <a href="#skills">Skills</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<section class="hero">
  <h1 id="name"></h1>
  <p id="title"></p>

  <img id="profile" class="profile"/>

  <button class="btn" onclick="openCV()">View CV</button>
  <button class="btn" onclick="downloadCV()">Download CV</button>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About</h2>
  <div class="card" id="bio"></div>
</section>

<!-- EDUCATION -->
<section id="education">
  <h2>Education</h2>
  <div class="card">Add your education here</div>
</section>

<!-- SKILLS -->
<section id="skills">
  <h2>Skills</h2>
  <div class="card">HTML, CSS, JavaScript</div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <div class="card" id="contactInfo"></div>

  <form onsubmit="sendMessage(event)">
    <input placeholder="Name" required>
    <input placeholder="Email" required>
    <textarea placeholder="Message" required></textarea>
    <button class="btn">Send</button>
  </form>
</section>

<script>
// STARS
for(let i=0;i<100;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  s.style.animationDuration=(2+Math.random()*5)+"s";
  document.getElementById("stars").appendChild(s);
}

// LOAD DATA FROM CONFIG
document.getElementById("name").innerText = CONFIG.name;
document.getElementById("title").innerText = CONFIG.title;
document.getElementById("profile").src = CONFIG.profileImage;
document.getElementById("bio").innerText = CONFIG.bio;

document.getElementById("contactInfo").innerHTML =
  "Email: " + CONFIG.email + "<br>Phone: " + CONFIG.phone;

// CV
function openCV(){
  window.open(CONFIG.cvFile);
}

function downloadCV(){
  let a=document.createElement("a");
  a.href=CONFIG.cvFile;
  a.download=CONFIG.cvFile;
  a.click();
}

// FORM
function sendMessage(e){
  e.preventDefault();
  alert("Message sent!");
}
</script>

</body>
</html>
